<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./vars.css">
  <link rel="stylesheet" href="./style.css">
  
  
  <style>
   a,
   button,
   input,
   select,
   h1,
   h2,
   h3,
   h4,
   h5,
   * {
       box-sizing: border-box;
       margin: 0;
       padding: 0;
       border: none;
       text-decoration: none;
       background: none;
   
       -webkit-font-smoothing: antialiased;
   }
   
   menu, ol, ul {
       list-style-type: none;
       margin: 0;
       padding: 0;
   }
   </style>
  <title>Document</title>
</head>
<body>
  <div class="welcome">
    <div class="welcome-to-taskify">
      Welcome TO
      <br />
      Taskify!
    </div>
    <div class="login-to-your-account">Login To Your Account</div>
    <img class="vector" src="vector0.svg" />
    <div class="taskify">TASKIFY!</div>
    <div class="bars-status-bar-i-phone-x">
      <div class="background"></div>
      <img class="battery" src="battery0.svg" />
      <img class="wifi" src="wifi0.svg" />
      <img class="mobile-signal" src="mobile-signal0.svg" />
      <div class="time-style">
        <div class="_9-41">9:41</div>
      </div>
    </div>
    <div class="group-2">
      <div class="group-1">
        <div class="rectangle-1"></div>
      </div>
    </div>
    <div class="group-2">
      <div class="group-1">
        <div class="rectangle-12"></div>
        <div class="password">Password</div>
      </div>
    </div>
    <img class="basil-eye-closed-solid" src="basil-eye-closed-solid0.svg" />
    <div class="email-address">Email address</div>
    <div class="rectangle-2"></div>
    <div class="login">login</div>
    <div class="don-t-have-account-sign-up">
      <span>
        <span class="don-t-have-account-sign-up-span">Don’t Have Account ?</span>
        <span class="don-t-have-account-sign-up-span2">Sign Up</span>
      </span>
    </div>
    <div class="forget-password">Forget Password?</div>
    <img class="lucide-triangle" src="lucide-triangle0.svg" />
    <img
      class="material-symbols-menu-rounded"
      src="material-symbols-menu-rounded0.svg"
    />
    <img class="mynaui-square" src="mynaui-square0.svg" />
  </div>
  
</body>
</html>
